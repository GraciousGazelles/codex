name: main list_agents native enum fix v4

on:
  push:
    branches:
      - main-list-agents-enum-fix
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: main-list-agents-enum-fix-native-v4
  cancel-in-progress: true

jobs:
  rewrite-commit-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            codex-rs

      - name: Rewrite to native enum variant
        shell: bash
        run: |
          set -euo pipefail
          python <<'PY'
          from pathlib import Path
          import re

          spec_path = Path('codex-rs/core/src/tools/spec.rs')
          spec = spec_path.read_text()
          spec = spec.replace(
              '    String {\n        #[serde(skip_serializing_if = "Option::is_none")]\n        description: Option<String>,\n    },\n',
              '    String {\n        #[serde(skip_serializing_if = "Option::is_none")]\n        description: Option<String>,\n    },\n    #[serde(rename = "string")]\n    StringEnum {\n        #[serde(skip_serializing_if = "Option::is_none")]\n        description: Option<String>,\n        #[serde(rename = "enum")]\n        enum_values: Vec<String>,\n    },\n'
          )
          spec = spec.replace(
              '        let mut json = serde_json::to_value(tool)?;\n        maybe_inject_tool_schema_enums(&mut json);\n',
              '        let json = serde_json::to_value(tool)?;\n'
          )
          spec = re.sub(
              r'\nfn maybe_inject_tool_schema_enums\(tool_json: &mut serde_json::Value\) \{.*?\n\}\n\nfn push_tool_spec\(',
              '\nfn push_tool_spec(',
              spec,
              flags=re.S,
          )
          spec = spec.replace(
              '        "descendant_edge_status".to_string(),\n        JsonSchema::String {\n            description: Some(\n                "Optional subtree filter for `include_descendants=true`. Use `open` or `closed` to limit returned descendant rows by persisted spawn-edge status. Cannot be combined with `ids`."\n                    .to_string(),\n            ),\n        },',
              '        "descendant_edge_status".to_string(),\n        JsonSchema::StringEnum {\n            description: Some(\n                "Optional subtree filter for `include_descendants=true`. Use `open` or `closed` to limit returned descendant rows by persisted spawn-edge status. Cannot be combined with `ids`."\n                    .to_string(),\n            ),\n            enum_values: vec!["open".to_string(), "closed".to_string()],\n        },'
          )
          spec = spec.replace(
              '            JsonSchema::Boolean { description }\n            | JsonSchema::String { description }\n            | JsonSchema::Number { description } => {',
              '            JsonSchema::Boolean { description }\n            | JsonSchema::String { description }\n            | JsonSchema::StringEnum { description, .. }\n            | JsonSchema::Number { description } => {'
          )
          spec_path.write_text(spec)

          spec_tests_path = Path('codex-rs/core/src/tools/spec_tests.rs')
          spec_tests = spec_tests_path.read_text()
          spec_tests = spec_tests.replace(
              '        JsonSchema::Boolean { description }\n        | JsonSchema::String { description }\n        | JsonSchema::Number { description } => {',
              '        JsonSchema::Boolean { description }\n        | JsonSchema::String { description }\n        | JsonSchema::StringEnum { description, .. }\n        | JsonSchema::Number { description } => {'
          )
          spec_tests_path.write_text(spec_tests)
          PY

      - name: Format Rust code
        working-directory: codex-rs
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --all

      - name: Commit fix back to branch before tests
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add codex-rs/core/src/tools/spec.rs codex-rs/core/src/tools/spec_tests.rs
          git rm -f patches/pr5-list-agents-descendant-edge-status-enum.patch
          git rm -f .github/workflows/main-list-agents-enum-native-fix.yml
          git rm -f .github/workflows/main-list-agents-enum-native-fix-v2.yml
          git rm -f .github/workflows/main-list-agents-enum-native-fix-v3.yml
          git rm -f .github/workflows/main-list-agents-enum-native-fix-v4.yml
          git commit -m "Use native JsonSchema enum support for list_agents descendant_edge_status"
          git push origin HEAD:${GITHUB_REF_NAME}

      - name: Run full Rust workspace test suite
        working-directory: codex-rs
        shell: bash
        run: |
          set -euo pipefail
          cargo test --workspace --locked
