name: sedna-heavy-tests

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or commit to validate
        required: false
        type: string
      test_filter:
        description: Optional cargo test filter appended to the selected command
        required: false
        type: string
      lane:
        description: Downstream regression lane
        required: true
        type: choice
        options:
          - all
          - core-compile-smoke
          - core-carry-smoke
          - core-ledger-smoke
          - codex.core-startup-sync-targeted
          - codex.core-subagent-surface-targeted
          - codex.core-subagent-notification-contract-targeted
          - codex.core-subagent-notification-visibility-targeted
          - codex.core-multi-agent-orchestration-targeted
          - codex.core-persisted-subagent-descendants-targeted
          - codex.core-context-serialization-targeted
          - codex.state-spawn-lineage-contract-targeted
          - codex.app-server-protocol-test
          - codex.downstream-docs-check
          - downstream-ledger-seam
        default: all
  pull_request:
    types:
      - labeled
  schedule:
    - cron: "15 16 * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "codex-rs/cli/**"
      - "codex-rs/common/**"
      - "codex-rs/core/**"
      - "codex-rs/protocol/**"
      - "codex-rs/state/**"
      - "codex-rs/tui/**"
      - "codex-rs/tui_app_server/**"
      - "docs/downstream-regression-matrix.md"
      - "justfile"

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' && github.ref_name != 'main' && github.ref_name != 'upstream-main' }}

permissions:
  contents: read

jobs:
  metadata:
    name: Resolve heavy-test checkout ref
    runs-on: ubuntu-24.04
    if: >-
      ${{
        github.event_name != 'pull_request' ||
        github.event.label.name == 'ci:heavy'
      }}
    outputs:
      checkout_ref: ${{ steps.meta.outputs.checkout_ref }}
      test_filter: ${{ steps.meta.outputs.test_filter }}
    steps:
      - name: Compute checkout ref
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          checkout_ref='${{ github.sha }}'
          if [[ '${{ github.event_name }}' == 'workflow_dispatch' && -n '${{ inputs.ref }}' ]]; then
            checkout_ref='${{ inputs.ref }}'
          elif [[ '${{ github.event_name }}' == 'pull_request' ]]; then
            checkout_ref='${{ github.event.pull_request.head.sha }}'
          fi

          echo "checkout_ref=${checkout_ref}" >> "$GITHUB_OUTPUT"
          echo "test_filter=${{ inputs.test_filter }}" >> "$GITHUB_OUTPUT"

  downstream_lanes:
    needs: metadata
    if: >-
      ${{
        needs.metadata.result == 'success' &&
        (
          github.event_name != 'workflow_dispatch' ||
          inputs.lane == 'all' ||
          inputs.lane == matrix.lane_id
        )
      }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane_id: core-compile-smoke
            run_command: just --justfile ../justfile core-compile-smoke
            supports_test_filter: false
          - lane_id: core-carry-smoke
            run_command: just --justfile ../justfile core-carry-smoke
            supports_test_filter: false
          - lane_id: core-ledger-smoke
            run_command: just --justfile ../justfile core-ledger-smoke
            supports_test_filter: false
          - lane_id: codex.core-startup-sync-targeted
            run_command: just --justfile ../justfile core-startup-sync-targeted
            supports_test_filter: false
          - lane_id: codex.core-subagent-surface-targeted
            run_command: just --justfile ../justfile core-subagent-surface-targeted
            supports_test_filter: false
          - lane_id: codex.core-subagent-notification-contract-targeted
            run_command: just --justfile ../justfile core-subagent-notification-contract-targeted
            supports_test_filter: false
          - lane_id: codex.core-subagent-notification-visibility-targeted
            run_command: just --justfile ../justfile core-subagent-notification-visibility-targeted
            supports_test_filter: false
          - lane_id: codex.core-multi-agent-orchestration-targeted
            run_command: just --justfile ../justfile core-multi-agent-orchestration-targeted
            supports_test_filter: false
          - lane_id: codex.core-persisted-subagent-descendants-targeted
            run_command: just --justfile ../justfile core-persisted-subagent-descendants-targeted
            supports_test_filter: false
          - lane_id: codex.core-context-serialization-targeted
            run_command: just --justfile ../justfile core-context-serialization-targeted
            supports_test_filter: false
          - lane_id: codex.state-spawn-lineage-contract-targeted
            run_command: just --justfile ../justfile core-state-spawn-lineage-contract-targeted
            supports_test_filter: false
          - lane_id: codex.app-server-protocol-test
            run_command: cargo test --locked -p codex-app-server-protocol
            supports_test_filter: true
          - lane_id: codex.downstream-docs-check
            run_command: just --justfile ../justfile downstream-docs-check
            supports_test_filter: false
          - lane_id: downstream-ledger-seam
            run_command: just --justfile ../justfile downstream-ledger-seam
            supports_test_filter: false
    uses: ./.github/workflows/_sedna-linux-rust.yml
    with:
      checkout_ref: ${{ needs.metadata.outputs.checkout_ref }}
      lane_id: ${{ matrix.lane_id }}
      summary_title: ${{ matrix.lane_id }}
      run_command: ${{ matrix.supports_test_filter && needs.metadata.outputs.test_filter != '' && format('{0} {1}', matrix.run_command, needs.metadata.outputs.test_filter) || matrix.run_command }}
